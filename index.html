<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScannBizz: Futuristic POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              orbitron: ['Orbitron', 'sans-serif'],
            },
            colors: {
              slate: {
                850: '#171f32',
                950: '#0a0e1a',
              },
              sky: {
                ...tailwind.theme.colors.sky
              }
            },
            keyframes: {
                glow: {
                    '0%, 100%': { opacity: 0.7 },
                    '50%': { opacity: 1 },
                }
            },
            animation: {
                glow: 'glow 2s ease-in-out infinite',
            }
          },
        },
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.1.0/",
    "react": "https://esm.sh/react@^19.1.0",
    "react-dom/client": "https://esm.sh/react-dom@^19.1.0/client",
    "@google/genai": "https://esm.sh/@google/genai@^1.11.0",
    "framer-motion": "https://esm.sh/framer-motion@^12.23.9",
    "lucide-react": "https://esm.sh/lucide-react@^0.525.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.7.0",
    "html5-qrcode": "https://esm.sh/html5-qrcode@^2.3.8",
    "recharts": "https://esm.sh/recharts@^3.1.0",
    "jspdf": "https://esm.sh/jspdf@^3.0.1",
    "html2canvas": "https://esm.sh/html2canvas@^1.4.1",
    "firebase-admin": "https://esm.sh/firebase-admin@^13.4.0",
    "@netlify/functions": "https://esm.sh/@netlify/functions@^4.1.15",
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/"
  }
}
</script>
<!-- Add Babel Standalone for in-browser TSX transformation -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-950 text-slate-200">
    <div id="root"></div>
    <!-- Change script type to "text/babel" and use data-type="module" -->
    <script type="text/babel" data-type="module" src="/index.tsx"></script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
